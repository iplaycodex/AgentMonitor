<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Hook 事件流程图</title>
  <desc id="desc">展示 Claude Code 和 Codex CLI Hook 事件从触发、包装、HTTP 投递、HookServer 解析，到 SessionManager 更新状态并返回成功响应的完整流程。</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #223044; }
      .sub { font: 15px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #65758a; }
      .swim { fill: #ffffff; stroke: #d8e0ea; stroke-width: 1.4; }
      .swim-title { font: 700 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #33465b; }
      .box-title { font: 700 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1d2939; }
      .text { font: 14px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #536579; }
      .code { font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #3f4d5c; }
      .edge { stroke: #58708a; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .edge-soft { stroke: #91a4b7; stroke-width: 1.8; fill: none; marker-end: url(#arrow-soft); stroke-dasharray: 7 7; }
      .label { font: 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #33465b; }
      .shadow { filter: drop-shadow(0 8px 18px rgba(31, 45, 61, 0.10)); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#58708a"/>
    </marker>
    <marker id="arrow-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#91a4b7"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text x="55" y="58" class="title">Hook 事件流程图</text>
  <text x="55" y="88" class="sub">两类 Hook 最终统一成 HookEvent，并在主线程回调 SessionManager.handleEvent。</text>

  <rect x="45" y="125" width="1110" height="118" rx="18" class="swim"/>
  <text x="70" y="158" class="swim-title">1. 事件触发</text>
  <rect x="45" y="270" width="1110" height="135" rx="18" class="swim"/>
  <text x="70" y="303" class="swim-title">2. 本地包装脚本</text>
  <rect x="45" y="432" width="1110" height="126" rx="18" class="swim"/>
  <text x="70" y="465" class="swim-title">3. HookServer 接收和归一化</text>
  <rect x="45" y="585" width="1110" height="110" rx="18" class="swim"/>
  <text x="70" y="618" class="swim-title">4. 会话更新与响应</text>

  <g class="shadow">
    <rect x="120" y="166" width="210" height="54" rx="14" fill="#e7f0ff" stroke="#8bb5ee"/>
    <text x="143" y="198" class="box-title">Claude Code Hook</text>
  </g>
  <text x="120" y="235" class="code">Stop / Notification / StopFailure / PreToolUse / UserPromptSubmit</text>

  <g class="shadow">
    <rect x="610" y="166" width="210" height="54" rx="14" fill="#e7f0ff" stroke="#8bb5ee"/>
    <text x="633" y="198" class="box-title">Codex notify Hook</text>
  </g>
  <text x="610" y="235" class="code">notify / agent-turn-complete</text>

  <g class="shadow">
    <rect x="120" y="318" width="210" height="62" rx="14" fill="#fff2cf" stroke="#e4bd57"/>
    <text x="143" y="350" class="box-title">claude-notify.sh</text>
    <text x="143" y="373" class="text">从 stdin 读取 payload</text>
  </g>

  <g class="shadow">
    <rect x="390" y="306" width="280" height="86" rx="14" fill="#fff2cf" stroke="#e4bd57"/>
    <text x="413" y="338" class="box-title">包装脚本通用处理</text>
    <text x="413" y="362" class="text">读取 hookPort，推导 /dev/tty</text>
    <text x="413" y="383" class="text">解析 JSON，写入 agentmonitor_tty</text>
  </g>

  <g class="shadow">
    <rect x="750" y="318" width="210" height="62" rx="14" fill="#fff2cf" stroke="#e4bd57"/>
    <text x="773" y="350" class="box-title">codex-notify.sh</text>
    <text x="773" y="373" class="text">从 $1 读取 payload</text>
  </g>

  <g class="shadow">
    <rect x="170" y="484" width="220" height="54" rx="14" fill="#f0f3f7" stroke="#b9c6d3"/>
    <text x="193" y="517" class="box-title">HTTP POST JSON</text>
  </g>
  <text x="170" y="559" class="code">/hooks/claude 或 /hooks/codex</text>

  <g class="shadow">
    <rect x="485" y="472" width="230" height="78" rx="14" fill="#e4f6ea" stroke="#78bf8a"/>
    <text x="508" y="505" class="box-title">HookServer.readData</text>
    <text x="508" y="529" class="text">累积字节，解析 HTTP 头</text>
    <text x="508" y="550" class="text">按 Content-Length 取 body</text>
  </g>

  <g class="shadow">
    <rect x="810" y="472" width="230" height="78" rx="14" fill="#f0eafa" stroke="#aa91c7"/>
    <text x="833" y="505" class="box-title">processBody</text>
    <text x="833" y="529" class="text">判断来源并归一化字段</text>
    <text x="833" y="550" class="code">HookEvent</text>
  </g>

  <g class="shadow">
    <rect x="190" y="630" width="260" height="50" rx="14" fill="#e4f6ea" stroke="#78bf8a"/>
    <text x="213" y="662" class="box-title">SessionManager.handleEvent</text>
  </g>
  <text x="190" y="704" class="text">创建或更新会话、映射状态、按需发通知</text>

  <g class="shadow">
    <rect x="590" y="630" width="190" height="50" rx="14" fill="#eef4ff" stroke="#96b7e7"/>
    <text x="613" y="662" class="box-title">界面刷新</text>
  </g>
  <text x="590" y="704" class="text">菜单栏计数、列表、等待闪烁</text>

  <g class="shadow">
    <rect x="895" y="630" width="190" height="50" rx="14" fill="#f0f3f7" stroke="#b9c6d3"/>
    <text x="918" y="662" class="box-title">HTTP 200 OK</text>
  </g>
  <text x="895" y="704" class="code">{ "ok": true }</text>

  <path d="M225 220 L225 317" class="edge"/>
  <path d="M715 220 L855 317" class="edge"/>
  <path d="M330 349 L389 349" class="edge"/>
  <path d="M750 349 L671 349" class="edge"/>
  <path d="M530 392 C530 432 350 440 280 483" class="edge"/>
  <text x="420" y="430" class="label">curl --noproxy localhost</text>
  <path d="M390 511 L484 511" class="edge"/>
  <path d="M715 511 L809 511" class="edge"/>
  <path d="M925 550 C925 595 520 605 450 641" class="edge"/>
  <text x="650" y="600" class="label">主线程回调 onEvent</text>
  <path d="M450 655 L589 655" class="edge"/>
  <path d="M1040 511 C1095 540 1095 615 1085 652" class="edge-soft"/>
  <text x="1044" y="583" class="label">sendOK</text>
</svg>
